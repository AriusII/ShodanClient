name: Release App

on:
  push:
    tags:
      - "app-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ShodanClient.slnx

      - name: Build
        run: dotnet build ShodanClient.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ShodanClient.slnx --no-build --configuration Release

      - name: Compute app version
        id: version
        run: echo "value=${GITHUB_REF_NAME#app-v}" >> "$GITHUB_OUTPUT"

  build:
    name: Publish (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish
        run: >
          dotnet publish Tools/ShodanClient.App/ShodanClient.App.csproj --configuration Release
          --runtime ${{ matrix.rid }} --self-contained true --output ./publish/${{ matrix.rid }}
          -p:PublishAot=true -p:Version=${{ needs.test.outputs.version }}

      - name: Zip
        run: >
          Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath
          ShodanClient.App-${{ needs.test.outputs.version }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.rid }}
          path: ShodanClient.App-${{ needs.test.outputs.version }}-${{ matrix.rid }}.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: app-*
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*.zip
