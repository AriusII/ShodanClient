name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CI: true

jobs:
  build-test:
    name: Build, test, format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ShodanClient.slnx

      - name: Build
        run: dotnet build ShodanClient.slnx --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Test
        run: >
          dotnet test ShodanClient.slnx --no-build --configuration Release
          --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: ./coverage
          retention-days: 7

      - name: Pack
        run: dotnet pack Src/ShodanClient/ShodanClient.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.*nupkg
          retention-days: 7

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build
        run: dotnet build ShodanClient.slnx --configuration Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
